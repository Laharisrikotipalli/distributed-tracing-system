<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Distributed Tracing Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#3b82f6;
  --success:#10b981;
  --warning:#f59e0b;
  --error:#ef4444;
  --bg:#f8fafc;
  --text:#1e293b;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:40px;
  margin:0;
}

.header-section{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:40px;
}

.stat-card{
  background:white;
  padding:20px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  box-shadow:0 4px 6px rgba(0,0,0,0.05);
}

.stat-label{
  font-size:14px;
  color:#64748b;
}

.stat-value{
  font-size:28px;
  font-weight:700;
}

.btn-trigger{
  background:var(--primary);
  color:white;
  border:none;
  padding:12px 24px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.card{
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.trace-id-btn{
  background:#f1f5f9;
  color:var(--primary);
  border:1px solid #cbd5e1;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-family:monospace;
}

.status-pill{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.status-ok{
  background:#dcfce7;
  color:#166534;
}

.status-err{
  background:#fee2e2;
  color:#991b1b;
}
</style>
</head>

<body>

<div class="header-section">
<h1>System Observability</h1>
<button class="btn-trigger" onclick="triggerTrace()" id="btn">🚀 Trigger</button>
</div>

<div class="stats-grid">
<div class="stat-card">
<div class="stat-label">System Health</div>
<div id="health" class="stat-value">--%</div>
</div>

<div class="stat-card">
<div class="stat-label">Total Traces</div>
<div id="count" class="stat-value">0</div>
</div>

<div class="stat-card">
<div class="stat-label">Active Services</div>
<div class="stat-value">3</div>
</div>
</div>

<h2>Recent Traces</h2>
<div id="traces"></div>

<script>

const GATEWAY="http://localhost:3010/api/go";
const TRACES="http://localhost:4000/api/traces";
const SPANS="http://localhost:4000/api/spans";

async function triggerTrace(){
  const b=document.getElementById("btn");
  b.disabled=true;
  b.innerText="Running...";
  try{
    await fetch(GATEWAY,{method:"POST"});
  }catch(e){}
  b.innerText="🚀 Trigger";
  b.disabled=false;
}

async function load(){

  try{

    const tRes=await fetch(TRACES);
    const traces=await tRes.json();

    const sRes=await fetch(SPANS);
    const spans=await sRes.json();

    document.getElementById("count").innerText=traces.length;

    let errors=spans.filter(s => (s.status || "").toLowerCase() === "error").length;
    let total=spans.length;

    let health=100;
    if(total>0){
      health=((total-errors)/total)*100;
    }

    const h=document.getElementById("health");
    h.innerText=health.toFixed(1)+"%";

    if(health>90) h.style.color="green";
    else if(health>70) h.style.color="orange";
    else h.style.color="red";

    const container=document.getElementById("traces");

    container.innerHTML=traces.reverse().map(t=>{

      const traceSpans = spans.filter(s => s.traceId === t.traceId);

      const isError = traceSpans.some(s =>
        (s.status || "").toLowerCase() === "error"
      );

      return `
      <div class="card">
        <div>
          <button class="trace-id-btn" onclick="location.href='trace.html?id=${t.traceId}'">
            ${t.traceId}
          </button>
          <div style="font-size:13px;margin-top:6px">
            Duration: ${Math.round(t.durationMs)} ms<br>
            Services: ${t.services.join(", ")}
          </div>
        </div>
        <div class="status-pill ${isError?'status-err':'status-ok'}">
          ${isError?'ERROR':'OK'}
        </div>
      </div>
      `;

    }).join("");

  }catch(e){
    document.getElementById("traces").innerHTML="Error loading data";
  }

}

load();
setInterval(load,3000);

</script>

</body>
</html>
