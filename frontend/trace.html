<!DOCTYPE html>
<html>
<head>
    <title>Trace Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 40px; }
        #viewport { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 40px; position: relative; min-height: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .bar { position: absolute; height: 36px; border-radius: 6px; color: white; display: flex; align-items: center; padding: 0 12px; font-size: 12px; font-weight: 600; white-space: nowrap; border: 1px solid rgba(0,0,0,0.1); transition: transform 0.2s; }
        .bar:hover { transform: scaleY(1.05); filter: brightness(1.1); cursor: pointer; }
        .error { background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.2) 20px); background-color: #ef4444 !important; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
        <h2>Trace: <span id="tid" style="color:#64748b; font-family:monospace"></span></h2>
        <a href="index.html" style="color:#3b82f6; text-decoration:none; font-weight:600">← Back</a>
    </div>
    <div id="viewport" data-testid="flame-graph-container"></div>

    <script>
        const tid = new URLSearchParams(window.location.search).get("id");
        const SCALE = 3;
        async function render() {
            document.getElementById("tid").innerText = tid;
            const res = await fetch(`http://localhost:4000/api/traces/${tid}`);
            const spans = await res.json();
            spans.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
            const t0 = new Date(spans[0].startTime).getTime();

            document.getElementById("viewport").innerHTML = spans.map((s, i) => {
                const left = (new Date(s.startTime).getTime() - t0) * SCALE;
                const width = s.durationMs * SCALE;
                const color = s.serviceName === 'gateway' ? '#3b82f6' : (s.serviceName === 'service-a' ? '#10b981' : '#f59e0b');
                return `<div class="bar ${s.status === 'error' ? 'error' : ''}" data-testid="span-bar-${s.spanId}" style="left:${left}px; top:${i*50}px; width:${Math.max(width, 140)}px; background-color:${color}">${s.serviceName} (${s.durationMs}ms)</div>`;
            }).join('');
        }
        render();
    </script>
</body>
</html>
